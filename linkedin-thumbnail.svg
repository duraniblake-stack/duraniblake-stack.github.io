  <text x="388" y="247" font-family="Arial, sans-serif" font-size="13" fill="#D4A843" text-anchor="middle" letter-spacing="1" font-weight="600">CFA LEVEL I</text>

  <rect x="461" y="228" width="175" height="28" rx="2" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <text x="548" y="247" font-family="Arial, sans-serif" font-size="13" fill="#D4A843" text-anchor="middle" letter-spacing="1" font-weight="600">BLOOMBERG CERT.</text>

