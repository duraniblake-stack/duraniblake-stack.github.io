  <text x="775" y="365" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#D4A843" text-anchor="middle">25yr</text>
  <text x="775" y="390" font-family="Arial, sans-serif" font-size="11" fill="#6B7080" text-anchor="middle" letter-spacing="2" font-weight="600">DATASET BUILT</text>
  <text x="775" y="410" font-family="Arial, sans-serif" font-size="10" fill="#4A5060" text-anchor="middle">S&amp;P 1500 · 1999–2024</text>

  <!-- Card 4 -->
  <rect x="905" y="315" width="215" height="110" fill="#0C0E18" stroke="#D4A843" stroke-width="1" opacity="0.9"/>
  <rect x="905" y="315" width="215" height="3" fill="#D4A843"/>
  <text x="1012" y="365" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#D4A843" text-anchor="middle">6</text>
  <text x="1012" y="390" font-family="Arial, sans-serif" font-size="11" fill="#6B7080" text-anchor="middle" letter-spacing="2" font-weight="600">PROJECTS</text>
  <text x="1012" y="410" font-family="Arial, sans-serif" font-size="10" fill="#4A5060" text-anchor="middle">Finance &amp; Engineering</text>

  <!-- BOTTOM BAR -->
  <rect x="0" y="550" width="1200" height="77" fill="#080A0F" opacity="0.9"/>
  <rect x="0" y="550" width="1200" height="1" fill="#D4A843" opacity="0.2"/>

