  <rect x="185" y="315" width="220" height="110" fill="#0C0E18" stroke="#D4A843" stroke-width="1" opacity="0.9" rx="0"/>
  <rect x="185" y="315" width="220" height="3" fill="#D4A843"/>
  <text x="295" y="365" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#D4A843" text-anchor="middle">+18.4%</text>
  <text x="295" y="390" font-family="Arial, sans-serif" font-size="11" fill="#6B7080" text-anchor="middle" letter-spacing="2" font-weight="600">EXCESS RETURN</text>
  <text x="295" y="410" font-family="Arial, sans-serif" font-size="10" fill="#4A5060" text-anchor="middle">Hedge Fund Simulation</text>

