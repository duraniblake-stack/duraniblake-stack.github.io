  <text x="185" y="585" font-family="Arial, sans-serif" font-size="13" fill="#6B7080" letter-spacing="1">Georgia State University · J. Mack Robinson College of Business</text>
  <text x="185" y="610" font-family="Arial, sans-serif" font-size="13" fill="#6B7080" letter-spacing="1">University of the West Indies · BSc Electrical Power Engineering</text>

